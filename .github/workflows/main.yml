name: Deploy MyDocuHub

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql
          coverage: none

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install JS dependencies & build assets
        run: |
          npm ci
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: public/build/
          retention-days: 1

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-assets
          path: public/build/

      - name: Package for SCP
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude='./.git' \
            --exclude='./.env' \
            --exclude='./node_modules' \
            --exclude='./storage/app' \
            --exclude='./storage/logs' \
            --exclude='./tests' .

      - name: Deploy archive via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "/tmp/deploy.tar.gz"
          target: "/tmp"

      - name: Post-deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            tar -xzf /tmp/deploy.tar.gz -C ${{ secrets.VPS_PATH }}
            rm -f /tmp/deploy.tar.gz
            cd ${{ secrets.VPS_PATH }}
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan db:seed --class=CategorieSeeder --force
            chmod -R 775 storage bootstrap/cache
            chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} storage bootstrap/cache
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize
            echo "✅ Déploiement MyDocuHub terminé."
